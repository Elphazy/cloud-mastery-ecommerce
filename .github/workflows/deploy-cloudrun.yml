name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ secrets.GCP_REGION }}
      BACKEND_SERVICE_NAME: ${{ secrets.CLOUD_RUN_BACKEND_SERVICE_NAME }}
      FRONTEND_SERVICE_NAME: ${{ secrets.CLOUD_RUN_FRONTEND_SERVICE_NAME }}
      RUN_DB_BOOTSTRAP: ${{ vars.RUN_DB_BOOTSTRAP || 'true' }}
      BACKEND_IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.CLOUD_RUN_BACKEND_SERVICE_NAME }}:${{ github.sha }}
      FRONTEND_IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.CLOUD_RUN_FRONTEND_SERVICE_NAME }}:${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          : "${{ secrets.GCP_PROJECT_ID }}"
          : "${{ secrets.GCP_REGION }}"
          : "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}"
          : "${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}"
          : "${{ secrets.CLOUD_RUN_BACKEND_SERVICE_NAME }}"
          : "${{ secrets.CLOUD_RUN_FRONTEND_SERVICE_NAME }}"
          : "${{ secrets.CLOUDSQL_INSTANCE_CONNECTION_NAME }}"
          : "${{ secrets.DB_USER }}"
          : "${{ secrets.DB_PASS }}"
          : "${{ secrets.DB_NAME }}"
          : "${{ secrets.NEXT_PUBLIC_CHAT_DEPLOYMENT }}"
          : "${{ secrets.NEXT_PUBLIC_CHAT_TITLE }}"
          : "${{ secrets.NEXT_PUBLIC_CART_API_URL }}"

      - name: Authenticate to Google Cloud with Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          token_format: 'access_token'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          install_components: 'beta'

      - name: Configure Docker for Google Cloud
        run: |
          gcloud auth configure-docker

      # Build and push backend
      - name: Build backend Docker image
        run: |
          docker build -t $BACKEND_IMAGE ./backend

      - name: Push backend Docker image
        run: |
          docker push $BACKEND_IMAGE

      # Deploy backend to Cloud Run
      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy $BACKEND_SERVICE_NAME \
            --image $BACKEND_IMAGE \
            --region $REGION \
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }} \
            --port 8080 \
            --allow-unauthenticated \
            --set-secrets="MYSQL_PRISMA_URL=MYSQL_PRISMA_URL:latest" \
            --add-cloudsql-instances=${{ secrets.CLOUDSQL_INSTANCE_CONNECTION_NAME }}

        # Run Prisma migrations and seed database
          # Download and start Cloud SQL Auth Proxy
      - name: Download Cloud SQL Auth Proxy
        run: |
          wget https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.3/cloud-sql-proxy.linux.amd64 -O cloud_sql_proxy
          chmod +x cloud_sql_proxy
      - name: Start Cloud SQL Auth Proxy
        run: |
          ./cloud_sql_proxy ${{ secrets.CLOUDSQL_INSTANCE_CONNECTION_NAME }} --address 127.0.0.1 --port 3306 &

      - name: Wait for Cloud SQL Proxy
        run: |
          for i in {1..30}; do
            nc -z 127.0.0.1 3306 && exit 0
            sleep 1
          done
          echo "Cloud SQL Proxy did not become ready on port 3306"
          exit 1

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run Prisma migrations
        run: |
          cd backend
          npm run prisma:migrate:deploy
        env:
          MYSQL_PRISMA_URL: "mysql://${{ secrets.DB_USER }}:${{ secrets.DB_PASS }}@127.0.0.1:3306/${{ secrets.DB_NAME }}"

      - name: Bootstrap database from SQL dump (optional)
        if: env.RUN_DB_BOOTSTRAP == 'true'
        run: |
          cd backend
          npm run prisma:seed:dump
        env:
          MYSQL_PRISMA_URL: "mysql://${{ secrets.DB_USER }}:${{ secrets.DB_PASS }}@127.0.0.1:3306/${{ secrets.DB_NAME }}"

       # Retrieve backend Cloud Run URL
      - name: Get backend Cloud Run URL
        id: get-backend-url
        run: |
          BACKEND_URL=$(gcloud run services describe $BACKEND_SERVICE_NAME --region $REGION --format='value(status.url)')
          echo "BACKEND_URL=$BACKEND_URL" >> $GITHUB_ENV

      # Build and push frontend
      - name: Build frontend Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${BACKEND_URL}/api/v1" \
            --build-arg NEXT_PUBLIC_CART_API_URL="${{ secrets.NEXT_PUBLIC_CART_API_URL }}" \
            --build-arg NEXT_PUBLIC_CHAT_DEPLOYMENT="${{ secrets.NEXT_PUBLIC_CHAT_DEPLOYMENT }}" \
            --build-arg NEXT_PUBLIC_CHAT_TITLE="${{ secrets.NEXT_PUBLIC_CHAT_TITLE }}" \
            -t $FRONTEND_IMAGE ./frontend

      - name: Push frontend Docker image
        run: |
          docker push $FRONTEND_IMAGE
          
      # Deploy frontend to Cloud Run
      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy $FRONTEND_SERVICE_NAME \
            --image $FRONTEND_IMAGE \
            --region $REGION \
            --port 3000 \
            --allow-unauthenticated
