name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy-services:
    runs-on: ubuntu-latest
    outputs:
      frontend_url: ${{ steps.get-frontend-url.outputs.frontend_url }}
    permissions:
      contents: 'read'
      id-token: 'write'
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ secrets.GCP_REGION }}
      DEPLOYER_SERVICE_ACCOUNT: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT_EMAIL }}
      BACKEND_SERVICE_NAME: ${{ secrets.CLOUD_RUN_BACKEND_SERVICE_NAME }}
      FRONTEND_SERVICE_NAME: ${{ secrets.CLOUD_RUN_FRONTEND_SERVICE_NAME }}
      BQ_DATASET: ${{ vars.BQ_DATASET || 'cloud_mastery' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT_EMAIL }}
          token_format: 'access_token'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Prepare image tags
        run: |
          PROJECT_ID_LC="$(echo "$PROJECT_ID" | tr '[:upper:]' '[:lower:]')"
          echo "BACKEND_IMAGE=gcr.io/${PROJECT_ID_LC}/${BACKEND_SERVICE_NAME}:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=gcr.io/${PROJECT_ID_LC}/${FRONTEND_SERVICE_NAME}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Configure Docker
        run: gcloud auth configure-docker --quiet

      - name: Build and Push Backend
        run: |
          docker build -t $BACKEND_IMAGE ./backend
          docker push $BACKEND_IMAGE

      - name: Deploy Backend
        run: |
          gcloud run deploy $BACKEND_SERVICE_NAME \
            --image $BACKEND_IMAGE \
            --region $REGION \
            --project $PROJECT_ID \
            --service-account=$DEPLOYER_SERVICE_ACCOUNT \
            --port 8080 \
            --allow-unauthenticated \
            --set-secrets "MYSQL_PRISMA_URL=MYSQL_PRISMA_URL:latest" \
            --add-cloudsql-instances=${{ secrets.CLOUDSQL_INSTANCE_CONNECTION_NAME }}

      - name: SQL Proxy and Prisma Migrations
        run: |
          wget https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.3/cloud-sql-proxy.linux.amd64 -O cloud_sql_proxy
          chmod +x cloud_sql_proxy
          ./cloud_sql_proxy ${{ secrets.CLOUDSQL_INSTANCE_CONNECTION_NAME }} --address 127.0.0.1 --port 3306 &
          sleep 10
          cd backend
          npm ci
          ENCODED_PASS=$(jq -nr --arg v "${{ secrets.DB_PASSWORD || secrets.DB_PASS }}" '$v|@uri')
          export MYSQL_PRISMA_URL="mysql://${{ secrets.DB_USER }}:${ENCODED_PASS}@127.0.0.1:3306/${{ secrets.DB_NAME }}"
          npm run prisma:migrate:deploy

      - name: Build and Push Frontend
        run: |
          BACKEND_URL=$(gcloud run services describe $BACKEND_SERVICE_NAME --region $REGION --format='value(status.url)')
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${BACKEND_URL}/api/v1" \
            -t $FRONTEND_IMAGE ./frontend
          docker push $FRONTEND_IMAGE

      - name: Deploy Frontend
        run: |
          gcloud run deploy $FRONTEND_SERVICE_NAME \
            --image $FRONTEND_IMAGE \
            --region $REGION \
            --port 3000 \
            --allow-unauthenticated

      - name: Get Frontend URL
        id: get-frontend-url
        run: |
          URL=$(gcloud run services describe $FRONTEND_SERVICE_NAME --region $REGION --format='value(status.url)')
          echo "frontend_url=$URL" >> "$GITHUB_OUTPUT"

  deploy-functions:
    runs-on: ubuntu-latest
    needs: deploy-services
    permissions:
      contents: 'read'
      id-token: 'write'
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ secrets.GCP_REGION }}
      DEPLOYER_SERVICE_ACCOUNT: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT_EMAIL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Authenticate
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT_EMAIL }}
      - name: Deploy Cloud Functions
        run: |
          gcloud functions deploy checkout-service --gen2 --region $REGION --runtime nodejs22 --entry-point cart_agent --source ./checkout-service --trigger-http --allow-unauthenticated --service-account=$DEPLOYER_SERVICE_ACCOUNT --quiet
          gcloud functions deploy sync-mysql-to-bq --gen2 --region $REGION --runtime python311 --entry-point sync_mysql_to_bq --source ./Connect-bigquery --trigger-http --allow-unauthenticated --service-account=$DEPLOYER_SERVICE_ACCOUNT --quiet
          gcloud functions deploy search-parts --gen2 --region $REGION --runtime python311 --entry-point search_parts --source ./search-parts --trigger-http --allow-unauthenticated --service-account=$DEPLOYER_SERVICE_ACCOUNT --quiet
          gcloud functions deploy search-products --gen2 --region $REGION --runtime python311 --entry-point search_product --source ./Search-products --trigger-http --allow-unauthenticated --service-account=$DEPLOYER_SERVICE_ACCOUNT --quiet
